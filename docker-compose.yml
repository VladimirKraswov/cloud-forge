services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_URL: /app/data/db.sqlite
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: cloudforge
      MINIO_SECRET_KEY: cloudforge123
      MINIO_BUCKET: cloud-forge
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      PUBLISHED_WORKER_IMAGE: ${PUBLISHED_WORKER_IMAGE:-xproger/cloud-forge-worker}
      PUBLISHED_WORKER_TAG: ${PUBLISHED_WORKER_TAG:-0.1.0}
    depends_on:
      - redis
      - minio
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: cloudforge
      MINIO_ROOT_PASSWORD: cloudforge123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
  sqlite-data: